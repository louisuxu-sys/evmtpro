<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; padding: 16px; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    h2 { font-size: 16px; margin-bottom: 12px; text-align: center; }
    .status { padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.ok { background: #1b4332; border: 1px solid #2d6a4f; }
    .status.wait { background: #3d2c08; border: 1px solid #e09f3e; }
    .status.err { background: #3d0808; border: 1px solid #c1121f; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 13px; margin-bottom: 12px; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #e63946; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
    button:hover { background: #c1121f; }
    .info { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
    .stats { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>🎰 百家之眼</h2>
  
  <div id="status" class="status wait">⏳ 等待連線...</div>
  
  <div class="stats">
    <span>訊息數: <b id="msgCount">0</b></span>
    <span>狀態: <b id="wsStatus">等待中</b></span>
  </div>

  <label>Render 伺服器 URL</label>
  <input type="text" id="serverUrl" placeholder="https://evmtpro.onrender.com">
  
  <button id="saveBtn">💾 儲存設定</button>
  
  <div class="info">
    請在 MT 真人頁面開啟後使用<br>
    擴充功能會自動攔截並轉發資料
  </div>

  <script src="popup.js"></script>
</body>
</html>
